    <style amp-custom>
    /* Reset & Global */
    * {

    /* BACKGROUND MALAM + BINTANG JATUH (TEMA EMAS GELAP & HITAM) */
    body {

     linear-gradient(180deg, #111111 0%, #0a0a0a 50%, #000000 100%);
     background-size: cover;
     color: #d4af37;
     display: flex;
     justify-content: center;
     align-items: center;
     min-height: 100vh;
     overflow: hidden;
     padding: 20px;
     flex-direction: column;
     position: relative;
    }
    
    /* layer bintang */
    body::before,
    body::after{
     content:"";
     position:fixed;
     top:-100%;
     left:0;
     width:100%;
     height:200%;
     pointer-events:none;
     z-index:0;
    }
    
    /* bintang kecil */
    body::before{
     background-image:
     radial-gradient(circle, #ffd700 1px, transparent 2px),
     radial-gradient(circle, #fff2a8 1px, transparent 2px),
     radial-gradient(circle, #ffffff 1px, transparent 2px);
     background-size: 120px 120px, 180px 180px, 90px 90px;
     animation: starsFall 18s linear infinite;
     opacity:.8;
    }
    
    /* shooting star kecil */
    body::after{
     background-image:
     radial-gradient(circle, rgba(255,215,0,.9) 1px, transparent 2px),
     radial-gradient(circle, rgba(255,255,255,.8) 1px, transparent 2px);
     background-size: 250px 250px, 350px 350px;
     animation: starsFast 10s linear infinite;
     opacity:.7;
    }
    
    @keyframes starsFall{
     from{ transform:translateY(-20%); }
     to{ transform:translateY(20%); }
    }
    
    @keyframes starsFast{
     from{ transform:translateY(-30%); }
     to{ transform:translateY(35%); }

    /* konten di atas background */
    .container,

    .container {

     align-items: center;
     position: relative;
     perspective: 1200px;
     transform-style: preserve-3d;
    }
    
    /* 3D Cube Default (Layar Desktop) */
    .cube {
     position: relative;
     width: 300px;
     height: 300px;
     transform-style: preserve-3d;
     transform: rotateX(30deg) rotateY(30deg);
     animation: spin 20s infinite linear;
     margin-top: 20px;
    }
    
    .cube div {
     position: absolute;
     width: 100%;
     height: 100%;
     background: rgba(10, 10, 10, 0.85);
     border: 2px solid rgba(212, 175, 55, 0.4);
     display: flex;
     align-items: center;
     justify-content: center;
     font-size: 20px;
     opacity: 0.9;
    }
    
    .cube .front  { transform: translateZ(150px); }
    .cube .back   { transform: rotateY(180deg) translateZ(150px); }
    .cube .left   { transform: rotateY(-90deg) translateZ(150px); }
    .cube .right  { transform: rotateY(90deg) translateZ(150px); }
    .cube .top    { transform: rotateX(90deg) translateZ(150px); }
    .cube .bottom { transform: rotateX(-90deg) translateZ(150px); }
    
    .cube amp-img {
     width: 100%;
     height: 100%;
     object-fit: cover;
    }
    
    /* Static Logo */
    .static-logo {
     width: 100px;
     height: 100px;
     margin-bottom: -50px;
    }
    
    /* Cube Animation */
    @keyframes spin {
     from { transform: rotateX(30deg) rotateY(30deg); }
     to   { transform: rotateX(30deg) rotateY(390deg); }
    }
    
    /* Call to Action Container */
    .cta {
     margin-top: 60px;
     text-align: center;
    }
    
    /* =========================================

      margin: 10px 5px;

      background: linear-gradient(180deg, #fceea7 0%, #d4af37 100%);

      color: #050505; 
      font-weight: bold;
      font-size: 18px;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-radius: 8px;
      border: 1px solid #ffffff;
      
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
      transition: all 0.3s ease;
    }
    
    /* Efek saat tombol disentuh */
    .cta a:hover {
